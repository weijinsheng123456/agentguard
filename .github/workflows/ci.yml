name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pyyaml pytest

    - name: Lint
      run: |
        ruff check qg/ gate.py

    - name: Self-check (validate all rules load correctly)
      run: |
        python gate.py version
        python gate.py run --quick

    - name: Test
      run: |
        python -m pytest tests/ -v

    - name: Archive trend data
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: quality-trend-${{ matrix.python-version }}
        path: ~/.hermes/quality-gate/trends.db
        retention-days: 7
